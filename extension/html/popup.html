<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Plutchik Emotion Lens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 16px;
    }

    .label {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting:last-child { border: none; }

    .setting-info {
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* Simple Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: .4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(16px); }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Plutchik</div>
    <div class="switch">
      <input type="checkbox" id="extensionEnabled" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div class="section">
    <div class="label">Analysis Settings</div>
    <div class="setting">
      <div class="setting-info">Show Sarcasm Flags</div>
      <label class="switch">
        <input type="checkbox" id="showSarcasm" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting">
      <div class="setting-info">Low-Confidence Labels</div>
      <label class="switch">
        <input type="checkbox" id="showLowConf" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting">
      <div class="setting-info">Contribute to HITL</div>
      <label class="switch">
        <input type="checkbox" id="optInHitl">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="label">Session Summary</div>
    <div class="summary-card">
      <div style="display:flex; justify-content: space-between; font-size: 0.85rem;">
        <span>Active Tab:</span>
        <span style="color: var(--accent)">reddit.com</span>
      </div>
      <div style="display:flex; justify-content: space-between; font-size: 0.85rem; margin-top: 4px;">
        <span>Items Scanned:</span>
        <span>12</span>
      </div>
      <div style="display:flex; justify-content: space-between; font-size: 0.85rem; margin-top: 4px;">
        <span>Primary Tone:</span>
        <span style="color: #ff7b72">Conflict (Intense)</span>
      </div>
    </div>
  </div>

  <div class="footer">
    Plutchik Emotion Lens v2.1<br>
    <a href="options.html" style="color: var(--accent); text-decoration: none;">Advanced Settings</a>
  </div>

  <script src="../js/popup.js"></script>
</body>
</html>
