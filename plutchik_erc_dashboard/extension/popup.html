<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    h2 {
      font-size: 16px;
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8b949e;
    }
    .status-dot.active {
      background: #3fb950;
    }
    .setting-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    select, input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #8b949e;
      text-align: center;
      border-top: 1px solid #30363d;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🎭 Plutchik Emotion Lens</h2>
  
  <div class="status">
    <div id="status-dot" class="status-dot"></div>
    <span id="status-text">Checking API...</span>
  </div>

  <div class="setting-group">
    <label>Inference Scenario</label>
    <select id="scenario">
      <option value="social">Social Media</option>
      <option value="workplace">Workplace</option>
      <option value="romance">Romance</option>
      <option value="casual">Casual</option>
    </select>
  </div>

  <div class="setting-group">
    <label>API Endpoint</label>
    <input type="text" id="endpoint" value="http://localhost:8000">
  </div>

  <div class="footer">
    Plutchik ERC v2.1.0 — Antigravity Engine
  </div>

  <script src="popup.js"></script>
</body>
</html>
